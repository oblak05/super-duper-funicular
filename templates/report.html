<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report - IG FFS</title>
    <link rel="stylesheet" href="/static/css/cyberpunk.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">IG <span>FFS</span></div>
            <nav>
                <a href="/">Home</a>
                <a href="/accounts-center">Account Center</a>
                <a href="/boost">Boost</a>
                <a href="/report" class="active">Report</a>
                <a href="/admin" style="color: #FF1744;">Admin</a>
            </nav>
        </div>
    </header>

    <main>
        <h2>Report <span class="neon">Issue</span></h2>
        <p class="subtitle">Contact support for technical issues</p>

        <div class="card glow-border" style="max-width: 600px;">
            <form id="reportForm">
                <div class="form-group">
                    <label for="reportEmail">Your Email / Contact</label>
                    <input type="email" id="reportEmail" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="reportSubject">Subject</label>
                    <input type="text" id="reportSubject" placeholder="Describe your issue" required>
                </div>

                <div class="form-group">
                    <label for="reportMessage">Message</label>
                    <textarea id="reportMessage" rows="6" placeholder="Detailed description..." required></textarea>
                </div>

                <button type="submit" class="glow-btn" style="padding: 12px 30px; width: 100%;">
                    SEND REPORT
                </button>
            </form>

            <div style="margin-top: 30px; padding-top: 30px; border-top: 1px solid rgba(255, 23, 68, 0.3);">
                <p style="color: #b0b0b0; margin-bottom: 15px;">💬 Or contact directly:</p>
                <p>
                    <a href="https://m.me/gueverro.vestio" target="_blank" style="color: #FF1744; text-decoration: none; font-weight: bold;">
                        → Message on Messenger
                    </a>
                </p>
            </div>
        </div>
    </main>

    <footer>
        <p>IG FFS © 2026 QXZI Boosting Tools | Cyberpunk Edition</p>
    </footer>

    <script>
        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Report submitted! We will get back to you soon.');
            this.reset();
        });
    </script>
</body>
</html>
